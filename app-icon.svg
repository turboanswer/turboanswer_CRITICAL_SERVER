<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bgGradient)"/>
  
  <!-- Lightning bolt icon representing AI power -->
  <path d="M320 160L192 256h80l-32 96 128-96h-80z" fill="url(#iconGradient)" stroke="white" stroke-width="4"/>
  
  <!-- Subtle circuit pattern -->
  <g opacity="0.3" stroke="url(#iconGradient)" stroke-width="2" fill="none">
    <circle cx="140" cy="140" r="8"/>
    <circle cx="372" cy="140" r="8"/>
    <circle cx="140" cy="372" r="8"/>
    <circle cx="372" cy="372" r="8"/>
    <line x1="148" y1="140" x2="180" y2="140"/>
    <line x1="332" y1="140" x2="364" y2="140"/>
    <line x1="148" y1="372" x2="180" y2="372"/>
    <line x1="332" y1="372" x2="364" y2="372"/>
  </g>
  
  <!-- App name hint -->
  <text x="256" y="440" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="white" opacity="0.8">TA</text>
</svg>